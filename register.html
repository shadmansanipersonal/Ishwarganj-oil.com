<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Ishwarganjoil.com</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <!-- Same navbar as index -->
        <div class="nav-container">
            <div class="logo">
                <a href="index.html"><h2>Ishwarganj-oil.com</h2></a>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="admin.html">Admin</a></li>
                <li><a href="scan.html">Scan</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main class="page-container">
        <div class="container">
            <div class="section">
                <div class="content-card glass-card">
<h1 class="section-title">Register</h1>
                    <p class="hero-subtitle">Quick Registration</p>
                
                <form id="register-form" class="register-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" class="input" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" class="input" required inputmode="tel">
                    </div>
                    <div class="form-group">
                        <label for="vehicle">Vehicle Number</label>
                        <input type="text" id="vehicle" class="input" required>
                    </div>
                    <button type="submit" class="btn-primary full-width">Register</button>
                </form>

                <div id="success-section" class="success-section" style="display: none;">
                    <h2 class="section-title">QR Ready</h2>
                    <div class="qr-container">
                        <p style="margin-bottom: var(--spacing-sm); font-weight: 500; font-size: 1.1rem;">আপনার কিউআর কোড তৈরি হয়েছে</p>
                        <canvas id="user-qr" class="qr-canvas"></canvas>
                        <p style="margin-top: var(--spacing-sm); font-weight: 500;">User ID: <strong id="user-id"></strong></p>
                    </div>
                    <div class="user-info">
                        <h3 class="section-title" style="margin-bottom: var(--spacing-md);">Details</h3>
                        <div style="display: grid; gap: var(--spacing-sm); text-align: left; max-width: 300px; margin: 0 auto;">
                            <p><strong>Name:</strong> <span id="reg-name" style="font-weight: 500;"></span></p>
                            <p><strong>Phone:</strong> <span id="reg-phone" style="font-weight: 500;"></span></p>
                            <p><strong>Vehicle:</strong> <span id="reg-vehicle" style="font-weight: 500;"></span></p>
                        </div>
                    </div>
                    <div style="display: flex; gap: var(--spacing-lg); justify-content: center; flex-wrap: wrap; margin-top: var(--spacing-xl);">
                        <a href="dashboard.html" class="btn-primary">Dashboard</a>
                        <button onclick="window.print()" class="btn-secondary">Print QR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
</div>
</main>

    <footer>
        <p>&copy; 2026 All Rights Reserved | Developed by Shadman Sani</p>
    </footer>

    <script src="script.js"></script>
    <script src="register.js"></script>
</body>
</html>
